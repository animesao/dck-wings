name: dck-wings
base: core22
version: latest
summary: dck agent for container nodes
description: |
  dck-wings is the agent component of the dck container management system.
  It runs on each node and handles container execution, file management,
  and console access.
license: MIT
confinement: classic
grade: stable

apps:
  dck-wings:
    command: dck-wings
    daemon: simple

parts:
  dck-wings:
    plugin: go
    source: .
    build-snaps:
      - go/1.22/stable
