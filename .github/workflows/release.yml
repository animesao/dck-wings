name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.18'

      - name: Read version
        run: echo "VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)" >> $GITHUB_ENV

      - name: Build for linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -o dck-wings-linux-amd64 -ldflags="-s -w" .

      - name: Build for linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -o dck-wings-linux-arm64 -ldflags="-s -w" .

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes 2>/dev/null || true
          gh release upload ${{ github.ref_name }} dck-wings-linux-amd64 --clobber
          gh release upload ${{ github.ref_name }} dck-wings-linux-arm64 --clobber
