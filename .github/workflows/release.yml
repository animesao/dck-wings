name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump: auto, major, minor, or patch'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Determine next version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.ref_name }}" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Using tag version: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
            echo "skip_bump=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT=$(cat VERSION | tr -d ' \n')
          echo "Current version: $CURRENT"

          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          echo "Latest tag: $LATEST_TAG"

          BASE=$CURRENT
          if [ -n "$LATEST_TAG" ] && [ "$(printf '%s\n' "$LATEST_TAG" "$CURRENT" | sort -V | tail -1)" = "$LATEST_TAG" ]; then
            BASE=$LATEST_TAG
          fi
          echo "Base version: $BASE"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          BUMP="${{ inputs.bump }}"

          if [ "$BUMP" = "auto" ]; then
            if [ "$PATCH" -ge 10 ]; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT"
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=v$NEXT" >> $GITHUB_OUTPUT
          echo "skip_bump=false" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        if: steps.version.outputs.skip_bump != 'true'
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add VERSION
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Sync VERSION file from tag
        if: steps.version.outputs.skip_bump == 'true'
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set snap version
        run: sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" snap/snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload snap to release
        run: |
          gh release upload "v${{ steps.version.outputs.version }}" "${{ steps.snapcraft.outputs.snap }}" --repo "${GITHUB_REPOSITORY}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
