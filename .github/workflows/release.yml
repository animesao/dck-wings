name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Snapcraft
        run: |
          sudo snap install snapcraft --classic
          sudo snap install core22

      - name: Build snap
        run: |
          sed -i "s/^version:.*/version: ${GITHUB_REF_NAME#v}/" snap/snapcraft.yaml
          snapcraft --destructive-mode

      - name: Upload snap to release
        run: |
          gh release upload "${GITHUB_REF_NAME}" ./*.snap --repo "${GITHUB_REPOSITORY}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
